<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>EMI Calculator India 2026 – Calculate Monthly EMI Instantly</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wrapper">

  <div class="header">
    <h1>EMI Calculator</h1>
    <p>Calculate your monthly loan EMI instantly</p>
  </div>

  <div class="card">

    <div class="result-box">
      <h2 id="emi">₹0</h2>
      <span>Your Monthly EMI</span>
    </div>

    <div class="input-group">
      <label>Loan Amount</label>
      <div class="value" id="loanValue"></div>
      <input type="range" id="loan" min="100000" max="10000000" step="10000" value="1000000">
    </div>

    <div class="input-group">
      <label>Interest Rate</label>
      <div class="value" id="rateValue"></div>
      <input type="range" id="rate" min="1" max="20" step="0.1" value="8">
    </div>

    <div class="input-group">
      <label>Loan Tenure</label>
      <div class="value" id="yearsValue"></div>
      <input type="range" id="years" min="1" max="30" step="1" value="20">
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
